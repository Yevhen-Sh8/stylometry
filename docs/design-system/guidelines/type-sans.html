<!-- @dsCard group="Type" viewport="700x180" name="DM Sans — interface" subtitle="Headings & body for the workspace surface" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-1); padding: 20px; color: var(--text-1); }
  .meta { font-family: var(--font-mono); font-size:10px; color: var(--text-3); float:right; }
  .l { border-bottom:1px solid var(--border-0); padding:8px 0; }
  .l:last-child { border:0; }
</style></head>
<body>
  <div class="l"><span class="meta">DM Sans · 800 · 16px</span><span style="font-size:16px; font-weight:800; color:var(--text-0); letter-spacing:-0.01em">DIMS — інтегральна оцінка ризиків</span></div>
  <div class="l"><span class="meta">700 · 14px</span><span style="font-size:14px; font-weight:700; color:var(--text-0)">Параметри аналізу</span></div>
  <div class="l"><span class="meta">600 · 12px</span><span style="font-size:12px; font-weight:600; color:var(--text-0)">Назва джерела</span></div>
  <div class="l"><span class="meta">400 · 13px</span><span style="font-size:13px">Стилометричний аналіз порівнює авторський стиль на основі функціональних слів.</span></div>
  <div class="l"><span class="meta">600 · 10px caps</span><span style="font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-3)">Підозрілих пар</span></div>
</body></html>
