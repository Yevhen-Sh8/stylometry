<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-0); padding: 18px; }
  .grid { display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
  .sw { border:1px solid var(--border-1); border-radius: var(--r-md); overflow:hidden; }
  .chip { height:58px; }
  .lbl { padding:8px 10px; background: var(--bg-1); }
  .name { font-family: var(--font-mono); font-size:11px; font-weight:600; color: var(--text-0); }
  .hex { font-family: var(--font-mono); font-size:10px; color: var(--text-2); margin-top:2px; }
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--bg-0)"></div><div class="lbl"><div class="name">--bg-0</div><div class="hex">#0f172a · canvas</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-1)"></div><div class="lbl"><div class="name">--bg-1</div><div class="hex">#111c2f · panels</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-2)"></div><div class="lbl"><div class="name">--bg-2</div><div class="hex">#1d2a3f · recessed</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-3)"></div><div class="lbl"><div class="name">--bg-3</div><div class="hex">#29384f · deepest</div></div></div>
</div>
</body></html>
