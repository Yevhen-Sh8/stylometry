services:
  - type: web
    name: stylometry
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 1
      - key: WEB_TIMEOUT
        value: 180
      - key: MPLCONFIGDIR
        value: /tmp/matplotlib
      # --- Персистентність стану/журналу (потребує ПЛАТНОГО плану) ---------
      # Render free plan НЕ підтримує постійні диски, тому за замовчуванням
      # SQLite-стан і журнал живуть у Data/ всередині контейнера: спільні для
      # всіх воркерів у межах одного деплою, але скидаються при редеплої.
      #
      # Щоб журнал/стан переживали редеплої — підвищити план, потім
      # розкоментувати DIMS_DATA_DIR + блок `disk:` нижче:
      # - key: DIMS_DATA_DIR
      #   value: /var/data
    # disk:
    #   name: dims-data
    #   mountPath: /var/data
    #   sizeGB: 1
