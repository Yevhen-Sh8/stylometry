<!-- @dsCard group="Type" viewport="700x190" name="Source Serif 4 — report" subtitle="Editorial long-form headline & body" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family: var(--font-serif); background: var(--paper); padding: 22px; color: var(--report-body); }
  .meta { font-family: var(--font-report-sans); font-size:10px; color: var(--muted); float:right; letter-spacing:.04em; }
  .l { border-bottom:1px solid var(--rule); padding:9px 0; }
  .l:last-child { border:0; }
  .kicker { font-family: var(--font-report-sans); font-size:10px; font-weight:800; letter-spacing:.22em; color:var(--crimson); text-transform:uppercase; }
</style></head>
<body>
  <div class="l"><span class="meta">Inter · 800 · kicker</span><span class="kicker">DIMS · Аналітичний звіт</span></div>
  <div class="l"><span class="meta">Source Serif · 800 · 30px</span><span style="font-size:30px; font-weight:800; color:var(--ink); letter-spacing:-0.015em; line-height:1.1">Оцінка дезінформаційних ризиків</span></div>
  <div class="l"><span class="meta">Serif italic · 17px</span><span style="font-size:17px; font-style:italic; color:var(--muted)">за стилометричними ознаками</span></div>
  <div class="l"><span class="meta">Serif · 400 · 15px</span><span style="font-size:15px; line-height:1.6">Стилометрія є індикатором координації, а не доказом авторства.</span></div>
</body></html>
