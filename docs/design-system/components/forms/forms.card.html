<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-0); color: var(--text-1); font-family: var(--font-sans); padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Select } = window.DIMSDesignSystem_175874;
function Demo() {
  const [m, setM] = React.useState('mds');
  return (
    <div className="grid">
      <div>
        <Input label="Назва джерела" placeholder="напр. ТАСС, Джерело А" defaultValue="RT Telegram" />
        <Select label="Тип ознак" value="word" onChange={()=>{}}
          options={[{value:'word',label:'Слова (word tokens)'},{value:'char',label:'Символьні n-грами'}]} />
      </div>
      <div>
        <Input label="URL / HTML / текст" textarea mono placeholder="Вставте текст, HTML або URL…" />
        <Select label="Метод проєкції" value={m} onChange={e=>setM(e.target.value)}
          hint="MDS точніше відображає Δ-відстані."
          options={[{value:'pca',label:'PCA (лінійна)'},{value:'mds',label:'MDS (зберігає відстані)'},{value:'tsne',label:'t-SNE (нелінійна)'}]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
