<!-- @dsCard group="Brand" viewport="700x170" name="Mathematical notation" subtitle="The DIMS formula motif — serif italic math, mono variables" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-1); padding: 22px; color: var(--text-1); }
  .math { font-family: var(--font-math); font-style: italic; white-space: nowrap; }
  .math sub { font-size:72%; vertical-align:sub; line-height:0; }
  .formula { background: var(--text-0); color: var(--bg-1); padding:14px 18px; border-radius: var(--r-sm); font-size:16px; margin:8px 0 16px; }
  .cap { font-family: var(--font-mono); font-size:10px; color: var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .grades { display:flex; gap:6px; }
  .g { font-family:var(--font-mono); font-weight:800; font-size:12px; padding:3px 10px; border-radius:var(--r-sm); color:#fff; }
</style></head>
<body>
  <p class="cap">Інтегральна формула</p>
  <div class="formula math">R<sub>DIMS</sub> = w<sub>1</sub>I<sub>content</sub> + w<sub>2</sub>I<sub>coord</sub> + w<sub>3</sub>I<sub>dynamics</sub> + w<sub>4</sub>I<sub>impact</sub> + w<sub>5</sub>I<sub>source</sub></div>
  <p class="cap">Грейди ризику (Наказ МО України № 46)</p>
  <div class="grades">
    <span class="g" style="background:var(--grade-f-bg)">F</span>
    <span class="g" style="background:var(--grade-b-bg)">B</span>
    <span class="g" style="background:var(--grade-s-bg); color:#1b1205">S</span>
    <span class="g" style="background:var(--grade-ss-bg)">SS</span>
    <span class="g" style="background:var(--grade-sss-bg); box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)">SSS</span>
  </div>
</body></html>
