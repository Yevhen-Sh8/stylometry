<!-- @dsCard group="Type" viewport="700x170" name="JetBrains Mono — data" subtitle="Metadata, metrics, tabular numerals" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family: var(--font-mono); background: var(--bg-1); padding: 20px; color: var(--text-1); }
  .meta { font-family: var(--font-sans); font-size:10px; color: var(--text-3); float:right; }
  .l { border-bottom:1px solid var(--border-0); padding:8px 0; font-variant-numeric: tabular-nums; }
  .l:last-child { border:0; }
</style></head>
<body>
  <div class="l"><span class="meta">Mono · 700 · 22px</span><span style="font-size:22px; font-weight:700; color:var(--text-0)">0.241</span></div>
  <div class="l"><span class="meta">600 · 12px</span><span style="font-size:12px; font-weight:600; color:var(--text-0)">Δ_Burrows = 0.78 · θ = 0.80</span></div>
  <div class="l"><span class="meta">400 · 11px meta</span><span style="font-size:11px; color:var(--text-2)">tass.ru · 1 240 ток. · 09:14:08</span></div>
  <div class="l"><span class="meta">numerals</span><span style="font-size:14px; color:var(--accent)">0123456789 · 1 240 967</span></div>
</body></html>
