<!-- @dsCard group="Colors" viewport="700x150" name="Editorial paper palette" subtitle="The report surface — warm paper, ink, journal accents" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family: var(--font-report-sans); background: var(--paper); padding: 18px; }
  .cap { font-family: var(--font-report-sans); font-size:10px; color: var(--muted); text-transform:uppercase; letter-spacing:.12em; font-weight:700; margin:0 0 10px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; }
  .chip { height:46px; border-radius: 3px; border:1px solid var(--rule); }
  .name { font-family: var(--font-mono); font-size:10px; color: var(--muted); margin-top:6px; text-align:center; }
</style></head>
<body>
<p class="cap">Neutrals — warm paper</p>
<div class="row" style="margin-bottom:14px">
  <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="name">--paper</div></div>
  <div class="sw"><div class="chip" style="background:var(--paper-alt)"></div><div class="name">--paper-alt</div></div>
  <div class="sw"><div class="chip" style="background:var(--paper-dim)"></div><div class="name">--paper-dim</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="name" style="color:var(--muted)">--ink</div></div>
</div>
<p class="cap">Editorial accents</p>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--navy)"></div><div class="name">--navy</div></div>
  <div class="sw"><div class="chip" style="background:var(--crimson)"></div><div class="name">--crimson</div></div>
  <div class="sw"><div class="chip" style="background:var(--amber)"></div><div class="name">--amber</div></div>
  <div class="sw"><div class="chip" style="background:var(--forest)"></div><div class="name">--forest</div></div>
  <div class="sw"><div class="chip" style="background:var(--teal)"></div><div class="name">--teal</div></div>
</div>
</body></html>
