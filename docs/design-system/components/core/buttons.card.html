<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-0); color: var(--text-1); font-family: var(--font-sans); padding: 22px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, Tabs } = window.DIMSDesignSystem_175874;
function Demo() {
  const [tab, setTab] = React.useState('files');
  return (
    <div>
      <div className="row"><span className="cap">Variants</span>
        <Button variant="primary">Запустити аналіз</Button>
        <Button variant="default">Завантажити CSV</Button>
        <Button variant="secondary">Звіт</Button>
        <Button variant="ghost">Очистити</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div className="row"><span className="cap">Sizes</span>
        <Button size="xs" variant="ghost">xs</Button>
        <Button size="sm">sm</Button>
        <Button size="md" variant="primary">md</Button>
        <Button size="large" variant="primary">large · 44px</Button>
      </div>
      <div className="row"><span className="cap">Tabs</span>
        <div style={{flex:1, minWidth: 360}}>
          <Tabs active={tab} onChange={setTab} tabs={[
            {id:'files',label:'Файли'},{id:'text',label:'Текст'},
            {id:'news',label:'Новини'},{id:'monitor',label:'Моніторинг'}]} />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
